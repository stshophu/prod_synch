name: Channable → Vaitto (Tluxy EU-WAR-2)

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests pandas psycopg2-binary
      - name: Run sync
        env:
          CHANNABLE_URL:    ${{ secrets.CHANNABLE_URL }}
          VAITTO_DB_URL:    ${{ secrets.VAITTO_DB_URL }}
          # VAITTO_DRY_RUN: '1'
        run: python channable_sync_vaitto.py
