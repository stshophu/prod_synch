name: Channable → Shopify Sync

on:
  schedule:
    - cron: '0 * * * *'   # every hour, on the hour
  workflow_dispatch:        # also lets you click "Run workflow" manually in GitHub

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run sync
        env:
          SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_TOKEN }}
          SHOPIFY_STORE: siebentaschen.myshopify.com
          CHANNABLE_URL: https://files.channable.com/p3c5dKKrUlPQZVH_aBglWA==.csv
        run: python channable_sync.py
