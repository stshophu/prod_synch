name: Channable → Vaitto QUICK (Tluxy EU-WAR-2) — price/stock only

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  sync-quick:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests pandas
      - name: Run quick sync
        env:
          CHANNABLE_URL:               ${{ secrets.CHANNABLE_URL }}
          IMPORT_HOOK_SECRET:          ${{ secrets.IMPORT_HOOK_SECRET }}
          VAITTO_HOOK_URL:             https://vaitto.com/api/public/hooks/vaitto-product-import
          VAITTO_SUPABASE_URL:         ${{ secrets.VAITTO_SUPABASE_URL }}
          VAITTO_SUPABASE_SERVICE_KEY: ${{ secrets.VAITTO_SUPABASE_SERVICE_KEY }}
          # VAITTO_DRY_RUN: '1'
        run: python channable_sync_vaitto_quick.py
